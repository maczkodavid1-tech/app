<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chat">
  <meta name="application-name" content="Chat">
  <meta name="theme-color" content="#000000">
  <meta name="format-detection" content="telephone=no">
  <title>Chat</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/static/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png">
  <link rel="icon" sizes="192x192" href="/static/icon-192.png">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0e'/><path d='M22 66 Q20 38 50 31 Q80 24 80 50 Q80 66 64 72 L40 82 L46 66 Z' fill='white'/></svg>">
  <style>
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --blue: #0071e3;
      --blue-l: #147CE5;
      --surface: rgba(16, 16, 18, 0.78);
      --surface-hi: rgba(255, 255, 255, 0.055);
      --border: rgba(255, 255, 255, 0.08);
      --border-s: rgba(255, 255, 255, 0.05);
      --fg: #f5f5f7;
      --fg2: rgba(245, 245, 247, 0.5);
      --fg3: rgba(245, 245, 247, 0.25);
      --acc: #0071e3;
      --accent: #0071e3;
      --glass: rgba(20, 20, 24, 0.72);
      --bg: rgba(10, 10, 14, 0.97);
      --hover: rgba(255, 255, 255, 0.07);
      --user-bg: #0071e3;
      --ai-bg: rgba(28, 28, 32, 0.95);
      --ai-fg: #f5f5f7;
      --rc-bg: rgba(26, 26, 30, 0.85);
      --input-bg: rgba(255, 255, 255, 0.07);
      --input-border: rgba(255, 255, 255, 0.07);
      --sep: rgba(255, 255, 255, 0.06);
      --liquid-glass: rgba(255, 255, 255, 0.085);
      --liquid-border: rgba(255, 255, 255, 0.28);
      --liquid-shadow: 0 8px 32px -4px rgba(0, 113, 227, 0.28);
      --glow: rgba(0, 113, 227, 0.22);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --surface: rgba(248, 248, 250, 0.82);
        --surface-hi: rgba(255, 255, 255, 0.9);
        --border: rgba(0, 0, 0, 0.07);
        --border-s: rgba(0, 0, 0, 0.04);
        --fg: #1d1d1f;
        --fg2: rgba(29, 29, 31, 0.5);
        --fg3: rgba(29, 29, 31, 0.26);
        --bg: rgba(245, 245, 247, 0.97);
        --hover: rgba(0, 0, 0, 0.06);
        --ai-bg: rgba(242, 242, 247, 0.96);
        --ai-fg: #1d1d1f;
        --rc-bg: rgba(238, 238, 244, 0.9);
        --input-bg: rgba(0, 0, 0, 0.05);
        --input-border: rgba(0, 0, 0, 0.07);
        --sep: rgba(0, 0, 0, 0.06);
        --liquid-glass: rgba(245, 245, 247, 0.88);
        --liquid-border: rgba(0, 0, 0, 0.14);
        --liquid-shadow: 0 8px 32px -4px rgba(0, 113, 227, 0.16);
        --glow: rgba(0, 113, 227, 0.18);
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    input,
    textarea,
    [contenteditable="true"],
    .bubble,
    .ai-bubble,
    .bubble *,
    .ai-bubble *,
    pre,
    code,
    .cb,
    .cb *,
    .err-bbl {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }

    button,
    [role="button"],
    .icon-btn,
    a,
    svg {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    html.standalone body {
      background: #000;
    }

    body {
      background: #000;
    }

    @supports (border-radius: 18px) {

      .bubble,
      .ai-bubble,
      .toast,
      .ibox,
      .sb-new,
      .hcard,
      .rc-wrap,
      .srch-bar,
      .err-bbl,
      .rcn-bar,
      .cb {
        -webkit-mask-image: -webkit-radial-gradient(white, black);
      }
    }

    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: #000;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-height: 100dvh;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #sidebar {
      position: fixed;
      inset: 0;
      z-index: 310;
      padding-top: var(--sat);
      background: var(--surface);
      backdrop-filter: blur(60px) saturate(200%) brightness(92%);
      -webkit-backdrop-filter: blur(60px) saturate(200%) brightness(92%);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 420ms cubic-bezier(0.32, 0.72, 0, 1.18);
      will-change: transform;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar.dragging {
      transition: none;
    }

    .sb-hdr {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: .5px solid var(--sep);
      flex-shrink: 0;
      gap: 6px;
    }

    .sb-title {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.3px;
      color: var(--fg);
    }

    .sb-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--input-bg);
      color: var(--fg3);
      cursor: pointer;
      transition: transform .18s cubic-bezier(.2, 1, .3, 1), opacity .12s;
    }

    .sb-close:active {
      transform: scale(.88);
      opacity: .7;
    }

    .sb-close svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    #sb-search-bar {
      flex-shrink: 0;
      overflow: hidden;
      height: 0;
      transition: height .32s cubic-bezier(.34, 1.28, .64, 1);
    }

    #sb-search-bar.open {
      height: 54px;
    }

    .sb-si {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 14px 6px;
      background: var(--input-bg);
      border-radius: 13px;
      border: .5px solid var(--input-border);
      padding: 0 12px;
      height: 38px;
    }

    .sb-si svg {
      width: 15px;
      height: 15px;
      fill: var(--fg3);
      flex-shrink: 0;
    }

    #sb-q {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      color: var(--fg);
      padding: 0;
      min-width: 0;
    }

    #sb-q::placeholder {
      color: var(--fg3);
    }

    #sb-q-cancel {
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--blue-l);
      padding: 0 0 0 8px;
      white-space: nowrap;
      transition: opacity .2s, width .28s cubic-bezier(.4, 0, .2, 1);
      overflow: hidden;
      width: 0;
      opacity: 0;
      flex-shrink: 0;
    }

    #sb-search-bar.open #sb-q-cancel {
      width: 52px;
      opacity: 1;
    }

    .sb-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      padding: 12px;
    }

    .sb-body::-webkit-scrollbar {
      display: none;
    }

    .sb-pull-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 0 0;
      font-size: 11px;
      color: var(--fg3);
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }

    .sb-pull-hint svg {
      width: 12px;
      height: 12px;
      fill: var(--fg3);
    }

    #sidebar.pull-hinting .sb-pull-hint {
      opacity: 1;
    }

    .sb-new {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-family: inherit;
      background: rgba(0, 113, 227, .12);
      border: .5px solid rgba(0, 113, 227, .2);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--blue-l);
      transition: transform .22s cubic-bezier(.2, 1, .3, 1), background .14s;
      text-align: left;
    }

    .sb-new:active {
      background: rgba(0, 113, 227, .2);
      transform: scale(.97);
    }

    .sb-new svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    @media (prefers-color-scheme:light) {
      .sb-new {
        background: rgba(0, 113, 227, .08);
      }
    }

    .sb-sec {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg3);
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 2px 3px 8px;
      margin-top: 4px;
    }

    .hcard {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 6px;
      background: transparent;
      border: .5px solid transparent;
      transition: transform .22s cubic-bezier(.2, 1, .3, 1), background .14s, border-color .14s;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hcard:hover {
      background: var(--input-bg);
      border-color: var(--border-s);
    }

    .hcard:active {
      transform: scale(.97);
      background: var(--input-bg);
    }

    .hcard.active {
      background: rgba(0, 113, 227, .1);
      border-color: rgba(0, 113, 227, .18);
    }

    @media (prefers-color-scheme:light) {
      .hcard.active {
        background: rgba(0, 113, 227, .08);
      }
    }

    .hcard-body {
      flex: 1;
      min-width: 0;
    }

    .hcard-pre {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -.15px;
    }

    .hcard-pre mark {
      background: rgba(0, 113, 227, .22);
      color: var(--blue-l);
      border-radius: 3px;
      padding: 0 1px;
    }

    .hcard.active .hcard-pre {
      color: var(--blue-l);
    }

    .hcard-meta {
      font-size: 11px;
      color: var(--fg3);
      margin-top: 2px;
    }

    .hcard-del {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--fg3);
      cursor: pointer;
      opacity: 0;
      transition: opacity .13s, transform .2s cubic-bezier(.2, 1, .3, 1), background .12s, color .12s;
    }

    .hcard:hover .hcard-del {
      opacity: 1;
    }

    .hcard-del:active {
      background: rgba(255, 59, 48, .15);
      color: rgba(255, 59, 48, .8);
      transform: scale(.85);
    }

    .hcard-del svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .hcard-pin {
      display: none;
      width: 11px;
      height: 11px;
      margin-right: 4px;
      flex-shrink: 0;
      vertical-align: -1px;
      opacity: .7;
    }

    .hcard.pinned .hcard-pin {
      display: inline-block;
    }

    .hcard.pinned .hcard-pin svg {
      width: 11px;
      height: 11px;
      fill: var(--blue-l);
    }

    .hcard-pre[contenteditable="true"] {
      outline: none;
      background: rgba(0, 113, 227, .1);
      border-radius: 6px;
      padding: 2px 5px;
      margin: -2px -5px;
      -webkit-user-select: text;
      user-select: text;
    }

    .h-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 48px 16px;
      text-align: center;
    }

    #action-sheet {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #action-sheet[aria-hidden="false"] {
      pointer-events: auto;
      opacity: 1;
    }

    .as-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .as-container {
      position: relative;
      padding: 0 8px calc(8px + var(--sab)) 8px;
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.32, .72, 0, 1);
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: auto;
    }

    #action-sheet[aria-hidden="false"] .as-container {
      transform: translateY(0);
    }

    .as-group {
      background: rgba(28, 28, 30, 0.92);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      backdrop-filter: blur(40px) saturate(180%);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .as-title-block {
      padding: 16px 16px 14px;
      text-align: center;
      border-bottom: .5px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .as-title {
      font-size: 13px;
      color: rgba(235, 235, 245, 0.85);
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .as-message {
      font-size: 13px;
      color: rgba(235, 235, 245, 0.55);
      font-weight: 400;
      line-height: 1.35;
      word-break: break-word;
    }

    .as-option {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      border: none;
      color: #0a84ff;
      font-family: inherit;
      font-size: 20px;
      font-weight: 400;
      padding: 17px 16px;
      text-align: center;
      cursor: pointer;
      border-bottom: .5px solid rgba(255, 255, 255, 0.08);
      display: block;
      width: 100%;
      transition: background .08s;
      -webkit-tap-highlight-color: transparent;
    }

    .as-option:last-child {
      border-bottom: none;
    }

    .as-option:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .as-option.destructive {
      color: #ff453a;
    }

    .as-option.destructive.confirm {
      font-weight: 600;
    }

    .as-cancel {
      -webkit-appearance: none;
      appearance: none;
      background: rgba(44, 44, 46, 0.96);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      backdrop-filter: blur(40px) saturate(180%);
      border: none;
      border-radius: 14px;
      color: #0a84ff;
      font-family: inherit;
      font-size: 20px;
      font-weight: 600;
      padding: 17px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .08s;
    }

    .as-cancel:active {
      background: rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme:light) {
      .as-group {
        background: rgba(242, 242, 242, 0.94);
      }

      .as-cancel {
        background: rgba(255, 255, 255, 0.96);
      }

      .as-option {
        border-bottom-color: rgba(60, 60, 67, 0.18);
      }

      .as-title-block {
        border-bottom-color: rgba(60, 60, 67, 0.18);
      }

      .as-title {
        color: rgba(60, 60, 67, 0.85);
      }

      .as-message {
        color: rgba(60, 60, 67, 0.6);
      }

      .as-option:active {
        background: rgba(0, 0, 0, 0.06);
      }

      .as-cancel:active {
        background: rgba(0, 0, 0, 0.06);
      }
    }

    .hcard.long-pressing {
      background: var(--input-bg);
      border-color: var(--border-s);
      transform: scale(.98);
    }

    .h-empty svg {
      width: 28px;
      height: 28px;
      fill: var(--fg3);
      opacity: .45;
    }

    .h-empty p {
      font-size: 13px;
      color: var(--fg3);
      line-height: 1.5;
    }

    #content {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
      touch-action: pan-y;
    }

    #scroll-area {
      position: absolute;
      top: var(--sat);
      right: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
      scrollbar-width: none;
      padding: 12px 0 84px;
      scroll-padding-top: 20px;
      scroll-padding-bottom: 20px;
    }

    #scroll-area::-webkit-scrollbar {
      display: none;
    }

    #msg-list {
      display: flex;
      flex-direction: column;
      padding: 0 14px;
      min-height: 100%;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
      animation: none;
    }

    .msg-group.u {
      align-items: flex-end;
    }

    .msg-group.a {
      align-items: flex-start;
    }


    .bubble {
      max-width: 100%;
      padding: 4px 0;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -.18px;
      word-break: break-word;
      border-radius: 0;
      position: relative;
    }

    .u .bubble {
      background: transparent;
      color: var(--fg);
      border-bottom-right-radius: 0;
      box-shadow: none;
      animation: none;
    }

    .ai-bubble {
      max-width: 100%;
      padding: 4px 0;
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: -.15px;
      word-break: break-word;
      border-radius: 0;
      border-bottom-left-radius: 0;
      background: transparent;
      color: var(--fg);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      box-shadow: none;
      animation: none;
      position: relative;
    }

    .img-in-msg {
      border-radius: 14px;
      overflow: hidden;
      max-width: 220px;
      max-height: 185px;
      object-fit: cover;
      display: block;
      margin-bottom: 6px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .2);
    }

    .rc-wrap {
      max-width: min(88vw, 440px);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 6px;
      border: .5px solid var(--border-s);
      background: var(--rc-bg);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
    }

    .rc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 13px;
      cursor: pointer;
      user-select: none;
      gap: 8px;
    }

    .rc-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1px;
      color: var(--fg3);
    }

    .rc-status {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .rc-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--fg3);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .rc-dot.done {
      animation: none;
      background: rgba(52, 199, 89, .55);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .25;
      }

      50% {
        opacity: .85;
      }
    }

    .rc-dur {
      font-size: 10.5px;
      color: var(--fg3);
    }

    .rc-chv {
      font-size: 10px;
      color: var(--fg3);
      transition: transform .22s cubic-bezier(.4, 0, .2, 1);
    }

    .rc-chv.open {
      transform: rotate(180deg);
    }

    .rc-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height .36s cubic-bezier(.32, 1.08, .5, 1);
    }

    .rc-body.open {
      max-height: 70vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;

          <button class="auth-btn secondary" onclick="authDoPasskeyLogin()">
            <svg class="passkey-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17 1a5 5 0 1 0 0 10A5 5 0 0 0 17 1zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm-1 8v2h-2v2h2v2h2v-2h2v-2h-2v-2h-2zM7 2C4.24 2 2 4.24 2 7c0 1.87 1.04 3.5 2.57 4.35-.04.21-.07.43-.07.65 0 3.31 2.69 6 6 6 .22 0 .44-.03.65-.07C12 19.46 13.63 21 15.5 21c2.49 0 4.5-2.01 4.5-4.5 0-.28-.03-.55-.08-.81A5.5 5.5 0 0 1 17 11v-1a5 5 0 0 1-4-2.91C12.37 7.06 11.7 7 11 7H7V2zM7 4h4c.36 0 .72.03 1.06.1A5.02 5.02 0 0 0 12 5.5c0 .17.01.34.03.5H7V4zm0 4h5.5c.26.83.72 1.58 1.33 2.16A4 4 0 0 0 10.55 17a6.04 6.04 0 0 1-4.35-5.68C6.51 11.23 6.74 11 7 11V8zm9 5c1.38 0 2.5 1.12 2.5 2.5S17.38 18 16 18s-2.5-1.12-2.5-2.5S14.62 13 16 13z"/>
            </svg>
            Bejelentkezés Passkeyval
          </button>
        </div>
        <div id="auth-form-register" style="display:none">
          <div class="auth-field">
            <label for="auth-email-reg">E-mail cím</label>
            <input type="email" id="auth-email-reg" placeholder="pelda@email.hu" autocomplete="email"
              autocapitalize="none">
          </div>
          <div class="auth-field">
            <label for="auth-pw-reg">Jelszó (min. 8 karakter)</label>
            <input type="password" id="auth-pw-reg" placeholder="••••••••" autocomplete="new-password">
          </div>
          <button class="auth-btn primary" onclick="authDoRegister()">Regisztráció</button>
          <div class="auth-divider">vagy</div>
          <button class="auth-btn secondary" onclick="authDoPasskeyRegister()">
            <svg class="passkey-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17 1a5 5 0 1 0 0 10A5 5 0 0 0 17 1zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm-1 8v2h-2v2h2v2h2v-2h2v-2h-2v-2h-2zM7 2C4.24 2 2 4.24 2 7c0 1.87 1.04 3.5 2.57 4.35-.04.21-.07.43-.07.65 0 3.31 2.69 6 6 6 .22 0 .44-.03.65-.07C12 19.46 13.63 21 15.5 21c2.49 0 4.5-2.01 4.5-4.5 0-.28-.03-.55-.08-.81A5.5 5.5 0 0 1 17 11v-1a5 5 0 0 1-4-2.91C12.37 7.06 11.7 7 11 7H7V2zM7 4h4c.36 0 .72.03 1.06.1A5.02 5.02 0 0 0 12 5.5c0 .17.01.34.03.5H7V4zm0 4h5.5c.26.83.72 1.58 1.33 2.16A4 4 0 0 0 10.55 17a6.04 6.04 0 0 1-4.35-5.68C6.51 11.23 6.74 11 7 11V8zm9 5c1.38 0 2.5 1.12 2.5 2.5S17.38 18 16 18s-2.5-1.12-2.5-2.5S14.62 13 16 13z"/>
            </svg>
            Regisztráció Passkeyval
          </button>
        </div>
        <div class="auth-error" id="auth-error"></div>
        <div class="auth-success" id="auth-success"></div>
      </div>
      <div id="auth-panel-loggedin" style="display:none">
        <div class="auth-title">tiffytime Fiók</div>
        <div class="auth-logged-in">
          <div class="auth-user-row">
            <div class="auth-user-avatar" id="auth-li-avatar"></div>
            <div>
              <div class="auth-user-label">Bejelentkezve</div>
              <div class="auth-user-email" id="auth-li-email"></div>
            </div>
          </div>
          <button class="auth-btn primary" onclick="authDoPasskeyRegister(true)" id="auth-btn-add-passkey">
            Passkey hozzáadása
          </button>
          <button class="auth-btn secondary" onclick="authDoLogout()">Kijelentkezés</button>
        </div>
        <div class="auth-error" id="auth-error-li"></div>
        <div class="auth-success" id="auth-success-li"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var AUTH_TOKEN_KEY = 'tiffytime_auth_token';
      var AUTH_EMAIL_KEY = 'tiffytime_auth_email';
      var _authEmail = null;

      function migrateStoredToken() {
        try {
          var old = localStorage.getItem(AUTH_TOKEN_KEY);
          if (old && !sessionStorage.getItem(AUTH_TOKEN_KEY)) sessionStorage.setItem(AUTH_TOKEN_KEY, old);
          localStorage.removeItem(AUTH_TOKEN_KEY);
        } catch (_) {}
      }
      migrateStoredToken();

      function authToken() {try {return sessionStorage.getItem(AUTH_TOKEN_KEY);} catch (_) {return null;}}
      function authEmail() {try {return _authEmail || localStorage.getItem(AUTH_EMAIL_KEY);} catch (_) {return _authEmail;}}
      window.getAuthToken = authToken;

      function authSetSession(token, email) {
        try {sessionStorage.setItem(AUTH_TOKEN_KEY, token);} catch (_) {}
        try {localStorage.removeItem(AUTH_TOKEN_KEY);} catch (_) {}
        try {localStorage.setItem(AUTH_EMAIL_KEY, email);} catch (_) {}
        _authEmail = email;
        updateAvatarUI(email);
      }

      function authClearSession() {
        try {sessionStorage.removeItem(AUTH_TOKEN_KEY);} catch (_) {}
        try {localStorage.removeItem(AUTH_TOKEN_KEY);} catch (_) {}
        try {localStorage.removeItem(AUTH_EMAIL_KEY);} catch (_) {}
        _authEmail = null;
        updateAvatarUI(null);
      }

      function updateAvatarUI(email) {
        var btn = document.getElementById('btn-avatar');
        var initials = document.getElementById('avatar-initials');
        var icon = btn ? btn.querySelector('.avatar-icon-default') : null;
        if (email && email.length > 0) {
          var letter = email[0].toUpperCase();
          if (initials) {initials.textContent = letter; initials.style.display = 'flex';}
          if (icon) icon.style.display = 'none';
          if (btn) btn.classList.add('logged-in');
        } else {
          if (initials) initials.style.display = 'none';
          if (icon) icon.style.display = '';
          if (btn) btn.classList.remove('logged-in');
        }
      }

      function authShowError(msg, li) {
        var el = document.getElementById(li ? 'auth-error-li' : 'auth-error');
        var sel = document.getElementById(li ? 'auth-success-li' : 'auth-success');
        if (el) el.textContent = msg;
        if (sel) sel.textContent = '';
      }

      function authShowSuccess(msg, li) {
        var el = document.getElementById(li ? 'auth-success-li' : 'auth-success');
        var eel = document.getElementById(li ? 'auth-error-li' : 'auth-error');
        if (el) el.textContent = msg;
        if (eel) eel.textContent = '';
      }

      function authClearMsg() {
        ['auth-error', 'auth-success', 'auth-error-li', 'auth-success-li'].forEach(function (id) {
          var el = document.getElementById(id); if (el) el.textContent = '';
        });
      }

      function openAuthModal() {
        authClearMsg();
        var overlay = document.getElementById('auth-overlay');
        if (overlay) overlay.classList.add('open');
        var email = authEmail();
        var loggedIn = document.getElementById('auth-panel-loggedin');
        var loggedOut = document.getElementById('auth-panel-loggedout');
        if (email) {
          if (loggedIn) loggedIn.style.display = '';
          if (loggedOut) loggedOut.style.display = 'none';
          var liEmail = document.getElementById('auth-li-email');
          var liAvatar = document.getElementById('auth-li-avatar');
          if (liEmail) liEmail.textContent = email;
          if (liAvatar) liAvatar.textContent = email[0].toUpperCase();
        } else {
          if (loggedIn) loggedIn.style.display = 'none';
          if (loggedOut) loggedOut.style.display = '';
        }
      }
      window.openAuthModal = openAuthModal;

      function closeAuthModal() {
        var overlay = document.getElementById('auth-overlay');
        if (overlay) overlay.classList.remove('open');
      }

      function authSwitchTab(tab) {
        var loginForm = document.getElementById('auth-form-login');
        var regForm = document.getElementById('auth-form-register');
        var tabLogin = document.getElementById('auth-tab-login');
        var tabReg = document.getElementById('auth-tab-register');
        authClearMsg();
        if (tab === 'login') {
          if (loginForm) loginForm.style.display = '';
          if (regForm) regForm.style.display = 'none';
          if (tabLogin) tabLogin.classList.add('active');
          if (tabReg) tabReg.classList.remove('active');
        } else {
          if (loginForm) loginForm.style.display = 'none';
          if (regForm) regForm.style.display = '';
          if (tabLogin) tabLogin.classList.remove('active');
          if (tabReg) tabReg.classList.add('active');
        }
      }
      window.authSwitchTab = authSwitchTab;

      async function authDoLogin() {
        authClearMsg();
        var email = (document.getElementById('auth-email-login') || {}).value || '';
        var pw = (document.getElementById('auth-pw-login') || {}).value || '';
        if (!email || !pw) {authShowError('Kérjük töltsd ki az összes mezőt.'); return;}
        try {
          var resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password: pw})
          });
          var data = await resp.json();
          if (!resp.ok) {authShowError(data.error || 'Bejelentkezési hiba.'); return;}
          authSetSession(data.token, data.email);
          authShowSuccess('Sikeres bejelentkezés!');
          setTimeout(closeAuthModal, 900);
        } catch (e) {authShowError('Hálózati hiba. Próbáld újra.');}
      }
      window.authDoLogin = authDoLogin;

      async function authDoRegister() {
        authClearMsg();
        var email = (document.getElementById('auth-email-reg') || {}).value || '';
        var pw = (document.getElementById('auth-pw-reg') || {}).value || '';
        if (!email || !pw) {authShowError('Kérjük töltsd ki az összes mezőt.'); return;}
        if (pw.length < 8) {authShowError('A jelszónak legalább 8 karakter hosszúnak kell lennie.'); return;}
        try {
          var resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password: pw})
          });
          var data = await resp.json();
          if (!resp.ok) {authShowError(data.error || 'Regisztrációs hiba.'); return;}
          authSetSession(data.token, data.email);
          authShowSuccess('Sikeres regisztráció!');
          setTimeout(closeAuthModal, 900);
        } catch (e) {authShowError('Hálózati hiba. Próbáld újra.');}
      }
      window.authDoRegister = authDoRegister;

      function b64urlToUint8Array(b64url) {
        try {
          var b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var binary = atob(b64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return bytes;
        } catch (e) {
          throw new Error('Érvénytelen hitelesítési adat: ' + (e.message || e));
        }
      }

      function uint8ArrayToB64url(bytes) {
        var binary = '';
        for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      }

      async function authDoPasskeyRegister(addToExisting) {
        authClearMsg();
        var isLi = !!addToExisting;
        var email = isLi ? authEmail() : ((document.getElementById('auth-email-reg') || {}).value || '');
        if (!email) {authShowError('Kérjük add meg az e-mail címedet.', isLi); return;}
        if (!window.PublicKeyCredential) {authShowError('A böngésző nem támogatja a kulcsszavakat.', isLi); return;}
        try {
          var chalResp = await fetch('/api/auth/webauthn/register/challenge', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', ...(authToken() ? {'Authorization': 'Bearer ' + authToken()} : {})},
            body: JSON.stringify({email})
          });
          var chalData = await chalResp.json();
          if (!chalResp.ok) {authShowError(chalData.error || 'Szerverhiba.', isLi); return;}

          var publicKey = {
            challenge: b64urlToUint8Array(chalData.challenge),
            rp: {id: chalData.rpId, name: chalData.rpName || 'tiffytime'},
            user: {
              id: b64urlToUint8Array(chalData.userId),
              name: String(chalData.userName || email || 'user'),
              displayName: String(chalData.userDisplayName || email || 'user')
            },
            pubKeyCredParams: [{type: 'public-key', alg: -7}],
            timeout: 60000,
            attestation: 'none',
            authenticatorSelection: {
              authenticatorAttachment: 'platform',
              requireResidentKey: true,
              residentKey: 'required',
              userVerification: 'required'
            }
          };

          var credential = await navigator.credentials.create({publicKey});
          if (!credential) {authShowError('Passkey létrehozása meghiúsult.', isLi); return;}

          var clientDataJSON = uint8ArrayToB64url(new Uint8Array(credential.response.clientDataJSON));
          var attestationObject = uint8ArrayToB64url(new Uint8Array(credential.response.attestationObject));

          var verResp = await fetch('/api/auth/webauthn/register/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, challenge: chalData.challenge, clientDataJSON, attestationObject})
          });
          var verData = await verResp.json();
          if (!verResp.ok) {authShowError(verData.error || 'Ellenőrzési hiba.', isLi); return;}
          authSetSession(verData.token, verData.email);
          authShowSuccess('Passkey sikeresen létrehozva!', isLi);
          if (!isLi) setTimeout(closeAuthModal, 900);
          else {
            var liEmail = document.getElementById('auth-li-email');
            var liAvatar = document.getElementById('auth-li-avatar');
            if (liEmail) liEmail.textContent = verData.email;
            if (liAvatar) liAvatar.textContent = (verData.email[0] || '').toUpperCase();
          }
        } catch (e) {
          if (e.name === 'NotAllowedError') {authShowError('A Passkey létrehozását elutasítottad.', isLi);}
          else {authShowError('Hiba: ' + (e.message || e.toString()), isLi);}
        }
      }
      window.authDoPasskeyRegister = authDoPasskeyRegister;

      async function authDoPasskeyLogin() {
        authClearMsg();
        var email = (document.getElementById('auth-email-login') || {}).value || '';
        if (!window.PublicKeyCredential) {authShowError('A böngésző nem támogatja a kulcsszavakat.'); return;}
        try {
          var chalResp = await fetch('/api/auth/webauthn/login/challenge', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
          });
          var chalData = await chalResp.json();
          if (!chalResp.ok) {authShowError(chalData.error || 'Szerverhiba.'); return;}

          var allowCredentials = (chalData.allowCredentials || []).map(function (c) {
            return {type: 'public-key', id: b64urlToUint8Array(c.id)};
          });

          var publicKey = {
            challenge: b64urlToUint8Array(chalData.challenge),
            rpId: chalData.rpId,
            timeout: 60000,
            userVerification: 'required',
            allowCredentials: allowCredentials
          };

          var assertion = await navigator.credentials.get({publicKey});
          if (!assertion) {authShowError('Hitelesítés meghiúsult.'); return;}

          var clientDataJSON = uint8ArrayToB64url(new Uint8Array(assertion.response.clientDataJSON));
          var authenticatorData = uint8ArrayToB64url(new Uint8Array(assertion.response.authenticatorData));
          var signature = uint8ArrayToB64url(new Uint8Array(assertion.response.signature));
          var credentialId = uint8ArrayToB64url(new Uint8Array(assertion.rawId));

          var verResp = await fetch('/api/auth/webauthn/login/verify', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({challenge: chalData.challenge, credentialId, authenticatorData, clientDataJSON, signature})
          });
          var verData = await verResp.json();
          if (!verResp.ok) {authShowError(verData.error || 'Ellenőrzési hiba.'); return;}
          authSetSession(verData.token, verData.email);
          authShowSuccess('Sikeres bejelentkezés!');
          setTimeout(closeAuthModal, 900);
        } catch (e) {
          if (e.name === 'NotAllowedError') {authShowError('A hitelesítést elutasítottad.');}
          else {authShowError('Hiba: ' + (e.message || e.toString()));}
        }
      }
      window.authDoPasskeyLogin = authDoPasskeyLogin;

      async function authDoLogout() {
        var tok = authToken();
        authClearSession();
        closeAuthModal();
        if (tok) {
          fetch('/api/auth/logout', {method: 'POST', headers: {Authorization: 'Bearer ' + tok}}).catch(function () { });
        }
      }
      window.authDoLogout = authDoLogout;

      async function authCheckMe() {
        var tok = authToken();
        if (!tok) return;
        try {
          var resp = await fetch('/api/auth/me', {headers: {Authorization: 'Bearer ' + tok}});
          if (resp.ok) {
            var data = await resp.json();
            _authEmail = data.email;
            localStorage.setItem(AUTH_EMAIL_KEY, data.email);
            updateAvatarUI(data.email);
          } else if (resp.status === 401) {
            authClearSession();
          }
        } catch (e) { }
      }

      document.getElementById('auth-modal-close').addEventListener('click', closeAuthModal);
      document.getElementById('auth-overlay').addEventListener('click', function (e) {
        if (e.target === this) closeAuthModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeAuthModal();
      });

      var savedEmail = null;
      try {savedEmail = localStorage.getItem(AUTH_EMAIL_KEY);} catch (_) {}
      if (savedEmail) updateAvatarUI(savedEmail);
      authCheckMe();
    })();
  </script>

  <script type="module">
    import {EditorView} from "https://esm.sh/@codemirror/view@6.23.0";
    import {EditorState} from "https://esm.sh/@codemirror/state@6.4.0";
    window.makeTextFreezeFree = function (containerElement, textContent) {
      if (containerElement._cmView) {
        try {containerElement._cmView.destroy();} catch (_) {}
        containerElement._cmView = null;
      }
      const invisibleTheme = EditorView.theme({
        "&": {
          backgroundColor: "transparent !important",
          color: "inherit",
          border: "none",
          width: "100%",
          height: "100%"
        },
        "&.cm-focused": {outline: "none"},
        ".cm-scroller": {
          fontFamily: "inherit",
          fontSize: "inherit",
          lineHeight: "inherit",
          overflow: "auto"
        },
        ".cm-content": {
          padding: "0",
        },
        "&.cm-focused .cm-selectionBackground, .cm-selectionBackground, .cm-content ::selection": {
          backgroundColor: "rgba(0, 113, 227, 0.3) !important"
        },
        ".cm-cursor": {display: "none"},
        ".cm-line": {
          wordWrap: "break-word",
          whiteSpace: "pre-wrap"
        }
      });
      const state = EditorState.create({
        doc: textContent,
        extensions: [
          EditorView.lineWrapping,
          EditorState.readOnly.of(true),
          invisibleTheme
        ]
      });
      containerElement.innerHTML = '';
      containerElement._cmView = new EditorView({state, parent: containerElement});
    };
  </script>
